name: IA Apuestas

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  ejecutar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar librerías
        run: pip install requests pandas openpyxl

      - name: Ejecutar bot
        run: python predicciones.py
